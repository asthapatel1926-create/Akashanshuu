
<!DOCTYPE html>
<html>
<head>
<title>Anshu ❤️ Akash</title>

<style>
body {
    margin: 0;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: Arial;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.heart {
    font-size: 90px;
    cursor: pointer;
    position: relative;
}

.heart span {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: white;
}

.bigHeart {
    font-size: 120px;
}

.hidden {
    display: none;
}

img {
    width: 280px;
    height: 350px;
    border-radius: 15px;
}

.caption {
    margin-top: 10px;
    font-size: 20px;
    color: white;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="start" class="center">
    <div class="heart" onclick="start()">
        ❤️
        <span>Click me</span>
    </div>
</div>

<!-- Screen 2 -->
<div id="welcome" class="center hidden">
    <div class="bigHeart">❤️</div>
    <h2 style="color:white;">anshu ke dil me aapka swagat hai ❣️</h2>
</div>

<!-- Screen 3 -->
<div id="slide" class="center hidden">
    <img id="img">
    <div class="caption">aree ye toh aap ho mere baby 😊</div>
</div>

<script>
let images = [
"Pic1.jpg",
"Pic2.jpg",
"Pic3.jpg",
"Pic4.jpg",
"Pic5.jpg",
"Pic6.jpg",
"Pic7.jpg",
"Pic8.jpg",
"Pic9.jpg"
];

let i = 0;

function start() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("welcome").classList.remove("hidden");

    setTimeout(() => {
        document.getElementById("welcome").classList.add("hidden");
        document.getElementById("slide").classList.remove("hidden");
        show();
    }, 2500);
}

function show() {
    document.getElementById("img").src = images[i];
    i = (i + 1) % images.length;
    setTimeout(show, 2000);
}
</script>

</body>
</html>
