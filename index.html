<!DOCTYPE html>
<html>
<head>
<title>Anshu ❤️ Akash</title>

<style>
body {
    margin: 0;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: Arial;
    overflow: hidden;
}

/* center */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* small heart */
.heart {
    font-size: 90px;
    cursor: pointer;
    position: relative;
}

.heart span {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: black;
}

/* big heart */
.bigHeart {
    font-size: 120px;
}

.hidden {
    display: none;
}

/* image */
img {
    width: 280px;
    height: 350px;
    border-radius: 15px;
}

/* caption */
.caption {
    margin-top: 10px;
    font-size: 20px;
    color: black;
}

/* floating hearts */
.heart-float {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<!-- music -->
<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<!-- Screen 1 -->
<div id="start" class="center">
    <div class="heart" onclick="start()">
        ❤️
        <span>Click me</span>
    </div>
</div>

<!-- Screen 2 -->
<div id="welcome" class="center hidden">
    <div class="bigHeart">❤️</div>
    <h2 style="color:black; margin-top:20px;">
        anshu ke dil me aapka swagat hai ❣️
    </h2>
</div>

<!-- Screen 3 -->
<div id="slide" class="center hidden">
    <img id="img">
    <div class="caption">aree ye toh aap ho mere baby 😊</div>
</div>

<script>
let images = [
"Pic1.jpg",
"Pic2.jpg",
"Pic3.jpg",
"Pic4.jpg",
"Pic5.jpg",
"Pic6.jpg",
"Pic7.jpg",
"Pic8.jpg",
"Pic9.jpg"
];

let i = 0;

function start() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("welcome").classList.remove("hidden");

    document.getElementById("music").play();

    setTimeout(() => {
        document.getElementById("welcome").classList.add("hidden");
        document.getElementById("slide").classList.remove("hidden");
        show();
    }, 2500);
}

// slideshow
function show() {
    document.getElementById("img").src = images[i];
    i = (i + 1) % images.length;
    setTimeout(show, 2000);
}

// floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart-float";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random()*20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 500);
</script>

</body>
</html>
